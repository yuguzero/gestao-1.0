<!DOCTYPE html>
<html>
<head>
    <title>Gestão AeG</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="manifest" href="/manifest.json">
</head>

<body class="bg-gray-100 p-4">

<div class="max-w-4xl mx-auto">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-4">
        <div>
            <h1 class="text-2xl font-bold">🎪 Controle de Locações</h1>
            <p class="text-gray-500 text-sm">Controle completo em tempo real</p>
        </div>

        <a href="/logout" class="bg-red-500 text-white px-3 py-1 rounded">Sair</a>
    </div>

    <!-- BOTÃO -->
    <button onclick="abrirModal()" class="bg-blue-600 text-white px-4 py-2 rounded mb-4">
        + Nova Locação
    </button>

    <!-- CARDS -->
    <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4 text-center">

        <div class="bg-white p-3 rounded shadow">
            <p class="text-gray-500 text-sm">Total</p>
            <h2 id="total" class="text-xl font-bold">0</h2>
        </div>

        <div class="bg-white p-3 rounded shadow">
            <p class="text-gray-500 text-sm">Ativos</p>
            <h2 id="ativos" class="text-xl font-bold">0</h2>
        </div>

        <div class="bg-white p-3 rounded shadow">
            <p class="text-gray-500 text-sm">Atrasados</p>
            <h2 id="atrasados" class="text-xl font-bold text-red-500">0</h2>
        </div>

        <div class="bg-white p-3 rounded shadow">
            <p class="text-gray-500 text-sm">Receita</p>
            <h2 id="lucro" class="text-xl font-bold text-green-600">0</h2>
        </div>

        <div class="bg-white p-3 rounded shadow">
            <p class="text-gray-500 text-sm">Disponível</p>
            <h2 id="disponivel" class="text-xl font-bold">0</h2>
        </div>

    </div>

    <!-- BUSCA -->
    <input id="busca" placeholder="🔍 Buscar..." 
    class="border p-2 w-full mb-3 rounded" oninput="carregar()">

    <!-- LISTA -->
    <div id="lista"></div>

</div>

<script>
async function carregar() {
    let res = await fetch("/brinquedos")
    let dados = await res.json()

    let busca = document.getElementById("busca").value.toLowerCase()
    let lista = document.getElementById("lista")
    lista.innerHTML = ""

    let total = 0
    let lucro = 0
    let ativos = 0
    let atrasados = 0
    let disponivel = 0

    let hoje = new Date()

    dados.forEach(b => {

        if (
            (b.nome || "").toLowerCase().includes(busca) ||
            (b.cliente || "").toLowerCase().includes(busca)
        ) {

            total++

            if (b.status === "concluído") lucro += Number(b.valor || 0)
            if (b.status === "locado") ativos++
            if (b.status === "disponível") disponivel++

            let atrasado = false
            if (b.retirada) {
                let data = new Date(b.retirada)
                if (data < hoje && b.status !== "concluído") {
                    atrasado = true
                    atrasados++
                }
            }

            let cor = atrasado ? "border-red-400" : "border-gray-200"

            lista.innerHTML += `
            <div class="bg-white p-3 rounded shadow mb-2 border ${cor}">
                <div class="flex justify-between">
                    <b>${b.nome}</b>
                    <span class="text-sm">${b.status}</span>
                </div>

                <p class="text-sm text-gray-600">👤 ${b.cliente || "—"}</p>
                <p class="text-sm text-gray-600">💰 R$${b.valor || 0}</p>

                <div class="flex gap-2 mt-2">
                    <button onclick="mudarStatus(${b.id}, 'locado')" class="bg-blue-500 text-white px-2 rounded">📦</button>
                    <button onclick="mudarStatus(${b.id}, 'concluído')" class="bg-green-500 text-white px-2 rounded">✔</button>
                    <button onclick="deletar(${b.id})" class="bg-red-500 text-white px-2 rounded">🗑️</button>
                </div>
            </div>`
        }
    })

    document.getElementById("total").innerText = total
    document.getElementById("lucro").innerText = "R$ " + lucro
    document.getElementById("ativos").innerText = ativos
    document.getElementById("atrasados").innerText = atrasados
    document.getElementById("disponivel").innerText = disponivel
}

async function mudarStatus(id, status) {
    await fetch("/status", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id, status })
    })
    carregar()
}

async function deletar(id) {
    await fetch("/deletar", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id })
    })
    carregar()
}

async function abrirModal() {
    let nome = prompt("Nome do brinquedo:")
    let cliente = prompt("Cliente:")
    let valor = prompt("Valor:")

    if (!nome) return

    await fetch("/brinquedos", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nome,
            cliente,
            valor,
            status: "disponível"
        })
    })

    carregar()
}

carregar()
</script>

</body>
</html>
