<!DOCTYPE html>
<html>
<head>
    <title>Gestão AeG</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="manifest" href="/manifest.json">
</head>

<body class="p-4 max-w-xl mx-auto">

<h1 class="text-2xl font-bold text-center">🎪 Controle de Locações</h1>

<h2 class="mt-4 font-bold">📊 Ganhos por mês</h2>
<canvas id="grafico" style="max-height: 250px;"></canvas>

<input id="nome" placeholder="Nome do brinquedo" class="border p-2 w-full mt-4">
<input id="preco" type="number" placeholder="Preço" class="border p-2 w-full mt-2">

<button onclick="adicionar()" class="bg-blue-500 text-white p-2 w-full mt-2">
➕ Adicionar
</button>

<ul id="lista" class="mt-4"></ul>

<script>
let graficoChart = null;

async function carregar() {
    let res = await fetch("/brinquedos")
    let dados = await res.json()

    let lista = document.getElementById("lista")
    lista.innerHTML = ""

    dados.forEach(b => {
        lista.innerHTML += `<li>${b.nome} - R$${b.preco}</li>`
    })

    atualizarGrafico(dados)
}

async function adicionar() {
    let nome = document.getElementById("nome").value
    let preco = document.getElementById("preco").value

    await fetch("/brinquedos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome, preco })
    })

    carregar()
}

function atualizarGrafico(dados) {
    let meses = {}

    dados.forEach(i => {
        if (i.status === "concluído" && i.retirada) {
            let d = new Date(i.retirada)
            let mes = (d.getMonth()+1) + "/" + d.getFullYear()

            if (!meses[mes]) meses[mes] = 0
            meses[mes] += Number(i.valor || 0)
        }
    })

    if (graficoChart) {
        graficoChart.destroy()
    }

    graficoChart = new Chart(document.getElementById("grafico"), {
        type: "bar",
        data: {
            labels: Object.keys(meses),
            datasets: [{
                label: "💰 Ganhos Mensais",
                data: Object.values(meses)
            }]
        }
    })
}

carregar()

// PWA (isso SIM fica aqui)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
}
</script>

</body>
</html>
