<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão AeG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json">
</head>
<body class="bg-slate-50 text-slate-800">

<div class="min-h-screen">
    <div class="max-w-6xl mx-auto p-4 md:p-6">

        <!-- HEADER -->
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between mb-6">
            <div>
                <h1 class="text-3xl font-bold">Controle de Locações</h1>
                <p class="text-slate-500">Controle completo das suas locações em tempo real</p>
            </div>

            <div class="flex gap-2">
                <button onclick="abrirModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl shadow">
                    + Nova Locação
                </button>
                <a href="/logout" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl shadow text-center">
                    Sair
                </a>
            </div>
        </div>

        <!-- CARDS -->
        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-5 gap-4 mb-6">
            <div class="bg-white rounded-2xl shadow p-4">
                <p class="text-sm text-slate-500">Total de Locações</p>
                <h2 id="total" class="text-3xl font-bold mt-2">0</h2>
            </div>

            <div class="bg-white rounded-2xl shadow p-4">
                <p class="text-sm text-slate-500">Locações Ativas</p>
                <h2 id="ativos" class="text-3xl font-bold mt-2">0</h2>
            </div>

            <div class="bg-white rounded-2xl shadow p-4">
                <p class="text-sm text-slate-500">Itens Disponíveis</p>
                <h2 id="disponivel" class="text-3xl font-bold mt-2">0</h2>
            </div>

            <div class="bg-white rounded-2xl shadow p-4">
                <p class="text-sm text-slate-500">Atrasados</p>
                <h2 id="atrasados" class="text-3xl font-bold mt-2 text-red-500">0</h2>
            </div>

            <div class="bg-white rounded-2xl shadow p-4">
                <p class="text-sm text-slate-500">Receita Total</p>
                <h2 id="receita" class="text-3xl font-bold mt-2 text-emerald-600">R$ 0,00</h2>
            </div>
        </div>

        <!-- BUSCA + FILTROS -->
        <div class="bg-white rounded-2xl shadow p-4 mb-6">
            <div class="relative">
                <span class="absolute left-3 top-3 text-slate-400">🔎</span>
                <input
                    id="busca"
                    placeholder="Buscar por nome ou cliente..."
                    class="w-full border border-slate-200 rounded-xl pl-10 pr-4 py-3 outline-none focus:ring-2 focus:ring-blue-500"
                    oninput="carregar()"
                >
            </div>

            <div class="flex flex-wrap items-center gap-2 mt-4">
                <span class="text-slate-500">⚲ Status:</span>

                <button onclick="setFiltro('todos')" class="px-3 py-2 rounded-xl bg-blue-600 text-white">Todos</button>
                <button onclick="setFiltro('disponível')" class="px-3 py-2 rounded-xl bg-slate-100 hover:bg-slate-200">Disponível</button>
                <button onclick="setFiltro('locado')" class="px-3 py-2 rounded-xl bg-slate-100 hover:bg-slate-200">Locado</button>
                <button onclick="setFiltro('retirada')" class="px-3 py-2 rounded-xl bg-slate-100 hover:bg-slate-200">Retirada</button>
                <button onclick="setFiltro('atrasado')" class="px-3 py-2 rounded-xl bg-slate-100 hover:bg-slate-200">Atrasado</button>
                <button onclick="setFiltro('concluído')" class="px-3 py-2 rounded-xl bg-slate-100 hover:bg-slate-200">Concluído</button>
            </div>
        </div>

        <!-- LISTA -->
        <div id="lista" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
</div>

<script>
let filtroAtual = "todos";

function setFiltro(filtro) {
    filtroAtual = filtro;
    carregar();
}

async function carregar() {
    const res = await fetch("/brinquedos");
    const dados = await res.json();

    const busca = (document.getElementById("busca")?.value || "").toLowerCase();
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    let total = 0;
    let ativos = 0;
    let disponivel = 0;
    let atrasados = 0;
    let receita = 0;

    const hoje = new Date();

    dados.forEach((b) => {
        const nome = (b.nome || "").toLowerCase();
        const cliente = (b.cliente || "").toLowerCase();
        const valor = Number(b.valor || 0);

        let statusVisual = b.status || "disponível";

        const bateBusca = nome.includes(busca) || cliente.includes(busca);
        if (!bateBusca) return;

        let itemAtrasado = false;
        if (b.retirada) {
            const dataRetirada = new Date(b.retirada);
            if (dataRetirada < hoje && statusVisual !== "concluído") {
                itemAtrasado = true;
                statusVisual = "atrasado";
            }
        }

        if (filtroAtual !== "todos" && statusVisual !== filtroAtual) return;

        total++;

        if (statusVisual === "locado" || statusVisual === "retirada") ativos++;
        if (statusVisual === "disponível") disponivel++;
        if (statusVisual === "atrasado") atrasados++;
        if (b.status === "concluído") receita += valor;

        const borda = itemAtrasado ? "border-red-300" : "border-slate-200";

        lista.innerHTML += `
            <div class="bg-white rounded-2xl shadow p-5 border ${borda}">
                <div class="flex items-start justify-between gap-3">
                    <div>
                        <h3 class="text-2xl font-semibold">${b.nome || "Sem nome"}</h3>
                        <p class="text-slate-500 mt-1">${b.status || "disponível"}</p>
                    </div>

                    <div class="flex gap-3 text-slate-500 text-lg">
                        <button onclick="editarItem(${b.id})" class="hover:text-blue-600" title="Editar">✏️</button>
                        <button onclick="deletarItem(${b.id})" class="hover:text-red-600" title="Excluir">🗑️</button>
                    </div>
                </div>

                <div class="mt-4 space-y-3 text-[15px] text-slate-700">
                    <p class="flex items-center gap-2">
                        <span>👤</span>
                        <span>${b.cliente || "Sem cliente"}</span>
                    </p>

                    <p class="flex items-center gap-2">
                        <span>📞</span>
                        <span>${b.telefone || "—"}</span>
                    </p>

                    <p class="flex items-center gap-2">
                        <span>📅</span>
                        <span>${b.entrega || "—"} - ${b.retirada || "—"}</span>
                    </p>

                    <p class="flex items-center gap-2 font-semibold text-slate-900">
                        <span>💲</span>
                        <span>R$ ${valor.toFixed(2)}</span>
                    </p>
                </div>

                <div class="flex flex-wrap gap-2 mt-4">
                    <button onclick="mudarStatus(${b.id}, 'disponível')" class="px-3 py-2 rounded-xl bg-slate-100 hover:bg-slate-200">
                        Disponível
                    </button>
                    <button onclick="mudarStatus(${b.id}, 'locado')" class="px-3 py-2 rounded-xl bg-blue-500 hover:bg-blue-600 text-white">
                        Locado
                    </button>
                    <button onclick="mudarStatus(${b.id}, 'retirada')" class="px-3 py-2 rounded-xl bg-amber-500 hover:bg-amber-600 text-white">
                        Retirada
                    </button>
                    <button onclick="mudarStatus(${b.id}, 'concluído')" class="px-3 py-2 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white">
                        Concluir
                    </button>
                </div>
            </div>
        `;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("ativos").innerText = ativos;
    document.getElementById("disponivel").innerText = disponivel;
    document.getElementById("atrasados").innerText = atrasados;
    document.getElementById("receita").innerText = `R$ ${receita.toFixed(2)}`;
}

async function mudarStatus(id, status) {
    await fetch("/status", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, status })
    });
    carregar();
}

async function deletarItem(id) {
    await fetch("/deletar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id })
    });
    carregar();
}

function editarItem(id) {
    alert("A edição eu monto pra você no próximo passo 😎");
}

async function abrirModal() {
    const nome = prompt("Nome do brinquedo:");
    if (!nome) return;

    const cliente = prompt("Cliente:") || "";
    const telefone = prompt("Telefone:") || "";
    const entrega = prompt("Data de entrega (AAAA-MM-DD):") || "";
    const retirada = prompt("Data de retirada (AAAA-MM-DD):") || "";
    const valor = prompt("Valor:") || "0";

    await fetch("/brinquedos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            nome,
            cliente,
            telefone,
            entrega,
            retirada,
            valor,
            status: "disponível"
        })
    });

    carregar();
}

carregar();
</script>

</body>
</html>
