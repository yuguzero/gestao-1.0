<script>
let graficoChart = null;

async function carregar() {
    let res = await fetch("/brinquedos")
    let dados = await res.json()

    // 🔔 ALERTA DE ATRASO
    let hoje = new Date()

    dados.forEach(b => {
        if (b.retirada) {
            let dataRetirada = new Date(b.retirada)

            if (dataRetirada < hoje && b.status !== "concluído") {
                alert(`⚠️ ATRASADO: ${b.nome}`)
            }
        }
    })

    let lista = document.getElementById("lista")
    lista.innerHTML = ""

    dados.forEach(b => {
        lista.innerHTML += `<li>${b.nome} - R$${b.valor || b.preco}</li>`
    })

    atualizarGrafico(dados)
}

async function adicionar() {
    let nome = document.getElementById("nome").value
    let preco = document.getElementById("preco").value

    await fetch("/brinquedos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            nome,
            valor: preco,
            status: "disponível"
        })
    })

    carregar()
}

function atualizarGrafico(dados) {
    let meses = {}

    dados.forEach(i => {
        if (i.status === "concluído" && i.retirada) {
            let d = new Date(i.retirada)
            let mes = (d.getMonth()+1) + "/" + d.getFullYear()

            if (!meses[mes]) meses[mes] = 0
            meses[mes] += Number(i.valor || 0)
        }
    })

    if (graficoChart) {
        graficoChart.destroy()
    }

    graficoChart = new Chart(document.getElementById("grafico"), {
        type: "bar",
        data: {
            labels: Object.keys(meses),
            datasets: [{
                label: "💰 Ganhos Mensais",
                data: Object.values(meses)
            }]
        }
    })
}

// 🚀 inicia
carregar()

// 📱 PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
}
</script><div class="grid grid-cols-2 gap-2 mt-4 text-center">
    <div class="bg-green-200 p-2 rounded">
        💰 Lucro<br><span id="lucro">0</span>
    </div>
    <div class="bg-blue-200 p-2 rounded">
        📦 Total<br><span id="total">0</span>
    </div>
</div>
