<!DOCTYPE html>
<html>
<head><script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Gestao AeG</title>
</head><link rel="manifest" href="/manifest.json"><script src="https://cdn.tailwindcss.com"></script>
<body><h2>📊 Ganhos por mês</h2>
<canvas id="grafico"></canvas>

    <h1>Inventário de Brinquedos 🎠</h1>

    <input type="text" id="nome" placeholder="Nome do brinquedo">
    <input type="number" id="preco" placeholder="Preço">
    <button onclick="adicionar()">Adicionar</button>

    <ul id="lista"></ul>

<script>
async function carregar() {
    let res = await fetch("/brinquedos")
    let dados = await res.json()

    let lista = document.getElementById("lista")
    lista.innerHTML = ""

    dados.forEach(b => {
        lista.innerHTML += `<li>${b.nome} - R$${b.preco}</li>`
    })
}

async function adicionar() {
    let nome = document.getElementById("nome").value
    let preco = document.getElementById("preco").value

    await fetch("/brinquedos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome, preco })
    })

    carregar()
}

carregar()
</script><script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
}
</script>

</body><!-- gráfico -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="grafico"></canvas>

<script>
async function grafico() {
    let res = await fetch("/brinquedos")
    let dados = await res.json()

    let meses = {}

    dados.forEach(i => {
        if (i.status === "concluído" && i.retirada) {
            let d = new Date(i.retirada)
            let mes = (d.getMonth()+1) + "/" + d.getFullYear()

            if (!meses[mes]) meses[mes] = 0
            meses[mes] += Number(i.valor || 0)
        }
    })

    new Chart(document.getElementById("grafico"), {
        type: "bar",
        data: {
            labels: Object.keys(meses),
            datasets: [{
                label: "Ganhos",
                data: Object.values(meses)
            }]
        }
    })
}

grafico()
</script>
</html>
